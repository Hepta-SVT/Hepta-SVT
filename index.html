<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hepta-SVT - منصة علوم الحياة والأرض</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-animation"></div>

<!-- Navbar -->
<nav class="navbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h1 class="logo-text">Hepta-SVT</h1>
    <div id="userNameDisplay" style="display:none;font-size:13px;font-weight:600;background:rgba(255,255,255,0.08);padding:6px 12px;border-radius:8px;">
        👤 <span id="userNameText"></span>
    </div>
</nav>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-item" onclick="navigateTo('dashboard')">🏠 الصفحة الرئيسية</div>
    <div class="sidebar-item" onclick="navigateTo('lessons')">📚 الدروس</div>
    <div class="sidebar-item" onclick="navigateTo('tests')">✍️ اختبر نفسك</div>
    <div class="sidebar-item" onclick="navigateTo('laboratory')">🧪 المختبر</div>
    <div class="sidebar-item" onclick="navigateTo('exercises')">📝 تمارين</div>
    <div class="sidebar-item" onclick="navigateTo('videos')">🎥 فيديوهات</div>
    <div class="sidebar-item" onclick="logout()" style="margin-top:auto;background:rgba(239,68,68,0.1);">🚪 تسجيل الخروج</div>
</aside>

<!-- HUD -->
<div class="game-hud" id="gameHud">
    <div class="hud-item"><div class="hud-label">المستوى</div><div class="hud-value" id="hudLevel">1</div></div>
    <div class="hud-item"><div class="hud-label">الاختبار</div><div class="hud-value" id="hudQuestion">1/10</div></div>
    <div class="hud-item"><div class="hud-label">النقاط</div><div class="hud-value points" id="hudPoints">0</div></div>
    <div class="hud-item"><div class="hud-label">الوقت</div><div class="hud-value timer" id="hudTimer">00:00</div></div>
</div>

<main class="main">

<!-- Name Screen -->
<section id="nameScreen" class="page active">
    <div style="max-width:500px;margin:80px auto;text-align:center;">
        <div style="background:rgba(255,255,255,0.05);border-radius:16px;padding:50px 40px;">
            <div style="font-size:70px;">👋</div>
            <h2 style="font-size:32px;font-weight:800;">مرحباً بك!</h2>
            <input type="text" id="firstName" placeholder="الاسم..." style="width:100%;padding:15px;margin:10px 0;background:rgba(255,255,255,0.05);border-radius:12px;color:white;">
            <input type="text" id="lastName" placeholder="النسب..." style="width:100%;padding:15px;margin:10px 0;background:rgba(255,255,255,0.05);border-radius:12px;color:white;">
            <button class="btn btn-primary" onclick="submitName()" style="width:100%;padding:15px;">دخول المنصة 🚀</button>
        </div>
    </div>
</section>

<!-- Dashboard -->
<section id="dashboard" class="page">
    <div style="text-align:center;margin-bottom:40px;">
        <h1 style="font-size:48px;font-weight:900;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Hepta-SVT</h1>
        <p style="color:rgba(255,255,255,0.6);">منصة خاصة بمادة علوم الحياة والأرض</p>
    </div>
    <div style="position:relative;max-width:650px;margin:0 auto;">
        <div style="position:relative;min-height:480px;">
            <div class="carousel-slide" style="position:absolute;width:100%;padding:45px;background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(37,99,235,0.05));border-radius:20px;text-align:center;">
                <div style="width:90px;height:90px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 30px;">📚</div>
                <h3 style="font-size:32px;font-weight:800;">ملخصات الدروس</h3>
                <button onclick="navigateTo('lessons')" class="btn btn-primary" style="margin-top:20px;">شاهد الملخصات →</button>
            </div>
            <div class="carousel-slide" style="position:absolute;width:100%;padding:45px;background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(5,150,105,0.05));border-radius:20px;text-align:center;opacity:0;visibility:hidden;">
                <div style="width:90px;height:90px;background:linear-gradient(135deg,#10b981,#059669);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 30px;">✍️</div>
                <h3 style="font-size:32px;font-weight:800;">اختبر تمكنك</h3>
                <button onclick="navigateTo('tests')" class="btn btn-primary" style="margin-top:20px;">ابدأ الاختبار →</button>
            </div>
            <div class="carousel-slide" style="position:absolute;width:100%;padding:45px;background:linear-gradient(135deg,rgba(249,115,22,0.15),rgba(234,88,12,0.05));border-radius:20px;text-align:center;opacity:0;visibility:hidden;">
                <div style="width:90px;height:90px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 30px;">🎮</div>
                <h3 style="font-size:32px;font-weight:800;">ألعاب تربوية</h3>
                <button onclick="navigateTo('levelsScreen')" class="btn btn-primary" style="margin-top:20px;">العب الآن →</button>
            </div>
        </div>
        <div style="display:flex;justify-content:center;gap:12px;margin-top:35px;">
            <div class="carousel-dot" onclick="goToCard(0)" style="width:14px;height:14px;border-radius:50%;background:var(--primary);cursor:pointer;"></div>
            <div class="carousel-dot" onclick="goToCard(1)" style="width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;"></div>
            <div class="carousel-dot" onclick="goToCard(2)" style="width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;"></div>
        </div>
    </div>
</section>

<!-- باقي الصفحات (Lessons, Tests, Game, etc) محذوفة للاختصار - ستضاف لاحقاً -->

</main>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/game.js"></script>
<script src="js/quiz.js"></script>
<script src="js/app.js"></script>
</body>
</html>
