<!-- Levels Screen (اختيار المستوى) -->
<section id="levelsScreen" class="page">
    <button class="back-btn" onclick="navigateTo('tests')">← الرجوع</button>
    <h2 style="text-align:center;margin:20px 0;">اختر المستوى</h2>
    <div class="levels-grid" id="levelsGrid"></div>
</section>

<!-- Game Screen (شاشة اللعبة) -->
<section id="gameScreen" class="page">
    <div class="game-content">
        <div class="question-card">
            <div class="clue-box">
                <div class="clue-label">💡 الدليل</div>
                <div class="clue-text" id="clueText"></div>
            </div>
            <div class="answer-section">
                <div class="answer-label">✏️ رتب الحروف هنا</div>
                <div class="answer-slots" id="answerSlots"></div>
            </div>
            <div class="choices-section">
                <div class="choices-label">🔡 الحروف المتاحة</div>
                <div class="letter-choices" id="letterChoices"></div>
            </div>
            <div class="game-actions">
                <button class="btn btn-ghost" onclick="resetLetters()">↺ إعادة</button>
                <button class="btn btn-warning" onclick="useHint()">💡 مساعدة (-5)</button>
                <button class="btn btn-danger" onclick="skipQuestion()">⏭ تخطي (-10)</button>
                <button class="btn btn-primary" onclick="checkAnswer()">✔ تحقق</button>
            </div>
        </div>
    </div>
</section>

<!-- Quiz Screen (شاشة الاختبار) -->
<section id="quizScreen" class="page">
    <button class="back-btn" onclick="navigateTo('quizRelation')">← الرجوع</button>
    <div class="quiz-container">
        <div class="quiz-stats">
            <div>السؤال <span id="quizProgress">1/20</span></div>
            <div>✅ <span id="quizCorrect">0</span></div>
            <div>❌ <span id="quizWrong">0</span></div>
        </div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
        <button id="quizNextBtn" class="btn btn-primary" style="display:none;" onclick="nextQuizQuestion()">التالي →</button>
    </div>
</section>

<!-- Exercises (تمارين) -->
<section id="exercises" class="page">
    <h2>📝 تمارين</h2>
    <div class="exercises-list">
        <div class="exercise-card" onclick="showMessage('قريباً! سيتم إضافة التمارين', 'info')">
            📄 سلسلة تمارين 1
        </div>
        <div class="exercise-card" onclick="showMessage('قريباً! سيتم إضافة التمارين', 'info')">
            📄 سلسلة تمارين 2
        </div>
    </div>
</section>

<!-- Videos -->
<section id="videos" class="page">
    <h2>🎥 فيديوهات تعليمية</h2>
    <div style="text-align:center;padding:80px;">📹 قريباً</div>
</section>

<!-- Laboratory -->
<section id="laboratory" class="page">
    <h2>🧪 المختبر الافتراضي</h2>
    <div style="text-align:center;padding:80px;">🔬 قريباً</div>
</section>

<!-- Tests -->
<section id="tests" class="page">
    <h2>✍️ اختبر نفسك</h2>
    <div class="cards-grid">
        <div class="card" onclick="navigateTo('quizRelation')">
            <div class="card-icon">🧠</div>
            <h3>Les fonctions de relation</h3>
        </div>
    </div>
</section>

<!-- Quiz Relation -->
<section id="quizRelation" class="page">
    <button class="back-btn" onclick="navigateTo('tests')">← الرجوع</button>
    <h2>🧠 Fonctions de relation</h2>
    <div class="cards-grid">
        <div class="card" onclick="startQuiz('easy')">
            <div class="card-icon">😊</div>
            <h3>المستوى السهل</h3>
        </div>
    </div>
</section>

<!-- Lessons -->
<section id="lessons" class="page">
    <h2>📚 الدروس</h2>
    <div class="cards-grid" id="lessonsGrid"></div>
</section>
